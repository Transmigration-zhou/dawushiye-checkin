name: 大物是也自动签到

on:
  schedule:
    # 每天北京时间 08:00 运行（UTC 00:00）
    - cron: "0 0 * * *"
  workflow_dispatch:  # 允许手动触发

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run sign script
        env:
          DAWU_TOKEN: ${{ secrets.DAWU_TOKEN }}
        run: python sign.py
